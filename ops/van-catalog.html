<head>

<style>
  /* ── Reset & Tokens ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #C0392B; --red-light: #FDECEA;
    --navy: #1B2A47; --navy-light: #EEF1F7;
    --amber: #D97706; --amber-light: #FFFBEB;
    --green: #16A34A; --green-light: #F0FDF4;
    --blue: #2563EB; --blue-light: #EFF6FF;
    --hd: #F96302;
    --amazon: #232F3E;
    --gray-50: #F9FAFB; --gray-100: #F3F4F6; --gray-200: #E5E7EB;
    --gray-300: #D1D5DB; --gray-400: #9CA3AF; --gray-500: #6B7280;
    --gray-700: #374151; --gray-900: #111827;
    --radius: 10px; --radius-sm: 6px;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.06);
    --shadow: 0 2px 8px rgba(0,0,0,.10);
    --shadow-lg: 0 8px 24px rgba(0,0,0,.14);
    --font: 'DM Sans', sans-serif;
    --font-display: 'Bebas Neue', cursive;
    --font-mono: 'DM Mono', monospace;
  }

  body {
    font-family: var(--font);
    background: var(--gray-50);
    color: var(--gray-900);
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* ── Back Button ── */
  .back-btn {
    position: fixed;
    top: 0; left: 0;
    z-index: 200;
    background: var(--navy);
    color: #fff;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 500;
    text-decoration: none;
    border-bottom-right-radius: var(--radius-sm);
    display: flex; align-items: center; gap: 6px;
    transition: background .15s;
  }
  .back-btn:hover { background: #243660; }

  /* ── Sticky Header ── */
  .site-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #fff;
    border-bottom: 1px solid var(--gray-200);
    box-shadow: var(--shadow-sm);
    padding: 10px 20px 10px 90px;
  }
  .header-inner {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .logo-block {
    display: flex;
    align-items: center;
    gap: 10px;

  }
  .logo-icon {
    width: 38px; height: 38px;
    background: var(--red);
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .logo-text {
    display: flex; flex-direction: column;
  }
  .logo-name {
    font-family: var(--font-display);
    font-size: 22px;
    letter-spacing: .04em;

    line-height: 1;
  }
  .logo-sub {
    font-size: 11px;

    margin-top: 2px;
  }
  .header-chips {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;

  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 500;

    border-radius: 20px;

  }
  .chip-default { background: var(--gray-100); color: var(--gray-700); }
  .chip-red { background: var(--red-light); color: var(--red); }
  .chip-green { background: var(--green-light); color: var(--green); }

  /* ── Tab Bar ── */
  .tab-bar {
    position: sticky;
    top: 67px;

    background: #fff;
    border-bottom: 1px solid var(--gray-200);
    display: flex;

  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex-shrink: 0;

    border: none;

    padding: 12px 18px;

    font-size: 13px;

  .tab-count {

  }
  .tab-btn.active .tab-count {

  }

  /* ── Stat Bar ── */
  .stat-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: var(--gray-50);
    border-bottom: 1px solid var(--gray-200);
    flex-wrap: wrap;
  }
  .stat-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 20px;
    font-family: var(--font-mono);
  }
  .stat-pill-total { background: var(--navy-light); color: var(--navy); }
  .stat-pill-critical { background: var(--red-light); color: var(--red); }
  .stat-pill-high { background: var(--amber-light); color: var(--amber); }
  .stat-pill-medium { background: var(--blue-light); color: var(--blue); }
  .stat-dot {
    width: 6px; height: 6px;

    flex-shrink: 0;
  }

  /* ── Tab Panels ── */
  .tab-panel { display: none; padding: 20px; }
  .tab-panel.active { display: block; }

  /* ── Category Divider ── */
  .category-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 28px 0 14px;
  }
  .category-divider:first-child { margin-top: 0; }

  /* ── Card Grid ── */
  .card-grid {
    display: grid;

  /* ── Item Card ── */
  .item-card {
    background: #fff;

    box-shadow: var(--shadow-sm);

  .item-card:hover {

  /* Priority accent strip on left edge */

    border-radius: var(--radius) 0 0 var(--radius);

  .item-card.accent-critical::before { background: var(--red); }
  .item-card.accent-high::before { background: var(--amber); }
  .item-card.accent-medium::before { background: var(--blue); }

  /* ── Card Image Area ── */
  .card-image {

  /* Image error fallback placeholder */

    display: flex;
    flex-direction: column;

    justify-content: center;
    gap: 8px;

  .card-body {

  /* ── Card Footer / CTA ── */

  .btn-hd { background: var(--hd); color: #fff; }
  .btn-amazon { background: var(--amazon); color: #FF9900; }
  .btn-default { background: var(--navy); color: #fff; }

  /* ── Empty State ── */
  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--gray-400);
  }
  .empty-state p { font-size: 14px; margin-top: 8px; }

  /* ── Bottom Status Badge ── */
  .status-badge {
    position: fixed;
    bottom: 16px;
    right: 16px;
    z-index: 300;
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    font-family: var(--font-mono);
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;

    transition: background .2s;

    max-width: calc(100vw - 32px);
  }
  .status-badge.loading { background: var(--gray-200); color: var(--gray-700); }
  .status-badge.connected { background: var(--green-light); color: var(--green); }
  .status-badge.error { background: var(--red-light); color: var(--red); cursor: pointer; }
  .status-badge .badge-btn {
    background: none;

  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .site-header { padding-left: 80px; }
    .header-chips { gap: 4px; }
    .chip { font-size: 10px; padding: 2px 8px; }
    .tab-panel { padding: 12px; }

  /* ── Print ── */
  @media print {
    .back-btn, .tab-bar, .status-badge { display: none !important; }

    .tab-panel:first-of-type { page-break-before: auto; }
  }
</style>

<script>
// ── Tab IDs → Page Section values ──
const TAB_SECTIONS = {
  tools:     'Van Tools',
  parts:     'Parts Inventory',
  bigticket: 'Big Ticket',
  inventory: 'Inventory System'
};

const PRIORITY_ORDER = { 'Critical': 0, 'High': 1, 'Medium': 2 };
const STAGE_RE = /(\d+)/;

// ── Tab switching ──
function switchTab(id) {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    const isActive = btn.dataset.tab === id;
    btn.classList.toggle('active', isActive);
    btn.setAttribute('aria-selected', isActive);
  });
  document.querySelectorAll('.tab-panel').forEach(panel => {
    panel.classList.toggle('active', panel.id === 'panel-' + id);
  });
  history.replaceState(null, '', '#' + id);
}

// ── Hash routing ──
const HASH_MAP = { tools: 'tools', parts: 'parts', bigticket: 'bigticket', inventory: 'inventory' };
function applyHash() {
  const hash = location.hash.replace('#', '');
  if (HASH_MAP[hash]) switchTab(hash);
}
window.addEventListener('hashchange', applyHash);
applyHash();

// ── Priority badge class ──
function priorityClass(p) {
  if (!p) return '';
  if (p === 'Critical') return 'badge-critical';
  if (p === 'High') return 'badge-high';
  return 'badge-medium';
}

// ── Priority accent class for card left strip ──
function accentClass(p) {
  if (!p) return 'accent-none';
  if (p === 'Critical') return 'accent-critical';
  if (p === 'High') return 'accent-high';
  return 'accent-medium';
}

// ── Vendor button ──
function vendorBtn(url, vendor) {
  if (!url) return '';
  const v = (vendor || '').toLowerCase();
  let cls, label;
  if (v.includes('home depot')) {
    cls = 'btn-hd'; label = '🏠 Home Depot';
  } else if (v.includes('amazon')) {
    cls = 'btn-amazon'; label = '📦 Amazon';
  } else {
    cls = 'btn-default'; label = vendor || 'View Product';
  }
  return `<a class="product-btn ${cls}" href="${esc(url)}" target="_blank" rel="noopener noreferrer">${label} ↗</a>`;
}

// ── Escape HTML ──
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Stage sort key ──
function stageKey(s) {
  if (!s) return 99;
  const m = String(s).match(STAGE_RE);
  return m ? parseInt(m[1], 10) : 99;
}

// ── Sort records ──
function sortRecords(records) {
  return [...records].sort((a, b) => {
    const f = a.fields, g = b.fields;
    const sd = stageKey(f['Stage']) - stageKey(g['Stage']);
    if (sd !== 0) return sd;
    const pa = PRIORITY_ORDER[f['Priority']] ?? 99;
    const pb = PRIORITY_ORDER[g['Priority']] ?? 99;
    if (pa !== pb) return pa - pb;
    return (f['Category'] || '').localeCompare(g['Category'] || '');
  });
}

// ── Image onerror handler (global so inline handler can call it) ──
function handleImgError(img, itemName) {
  const container = img.closest('.card-image');
  if (!container) return;
  container.innerHTML = `
    <div class="card-img-fallback">
      <span class="fallback-icon">🔧</span>
      <span class="fallback-name">${esc(itemName)}</span>
    </div>`;
}

// ── Build card HTML ──
function cardHTML(r) {
  const f = r.fields;
  const imgUrl = (f['Image URL'] || '').trim();
  const productUrl = (f['Product URL'] || '').trim();
  const priority = f['Priority'] || '';
  const stage = f['Stage'] || '';
  const itemName = f['Item Name'] || 'Unnamed Item';

  // Always show image area — real image or styled fallback
  const imgArea = imgUrl
    ? `<div class="card-image"><img src="${esc(imgUrl)}" alt="${esc(itemName)}" loading="lazy" onerror="handleImgError(this,'${esc(itemName).replace(/'/g,'&#39;')}')"></div>`
    : `<div class="card-image"><div class="card-img-fallback"><span class="fallback-icon">🔧</span><span class="fallback-name">${esc(itemName)}</span></div></div>`;

  const priorityBadge = priority
    ? `<span class="badge ${priorityClass(priority)}">${esc(priority)}</span>`
    : '';
  const stageBadge = stage
    ? `<span class="badge badge-stage">${esc(stage)}</span>`
    : '';

  const sku = (f['SKU / Model'] || '').trim();
  const vendor = (f['Vendor'] || '').trim();
  const qty = f['Quantity per Van'] != null ? String(f['Quantity per Van']) : '';
  const bin = (f['Bin Location'] || '').trim();

  // SKU shown prominently under name
  const skuHTML = sku
    ? `<span class="card-sku" title="${esc(sku)}">${esc(sku)}</span>`
    : '';

  // Qty per Van shown bold/large
  const qtyHTML = qty
    ? `<div class="card-qty-row"><span class="card-qty-label">Qty/Van</span><span class="card-qty-value">${esc(qty)}</span></div>`
    : '';

  // Remaining details (vendor, bin) — not SKU or qty (handled separately)
  const details = [
    vendor ? `<div class="card-detail"><span class="card-detail-label">Vendor</span><span class="card-detail-value">${esc(vendor)}</span></div>` : '',
    bin    ? `<div class="card-detail"><span class="card-detail-label">Bin</span><span class="card-detail-value">${esc(bin)}</span></div>` : '',
  ].join('');

  const notes = (f['Notes'] || '').trim();
  const notesHTML = notes ? `<div class="card-notes">${esc(notes)}</div>` : '';

  const btnHTML = productUrl ? `<div class="card-footer">${vendorBtn(productUrl, vendor)}</div>` : '';

  return `
<div class="item-card ${accentClass(priority)}">
  ${imgArea}
  <div class="card-body">
    <div class="card-badges">${priorityBadge}${stageBadge}</div>
    <div class="card-name">${esc(itemName)}</div>
    ${skuHTML}
    ${qtyHTML}
    <div class="card-details">${details}</div>
    ${notesHTML}
  </div>
  ${btnHTML}
</div>`.trim();
}

// ── Build stat bar ──
function buildStats(records) {
  const total = records.length;
  const critical = records.filter(r => r.fields['Priority'] === 'Critical').length;
  const high = records.filter(r => r.fields['Priority'] === 'High').length;
  const medium = records.filter(r => r.fields['Priority'] === 'Medium').length;
  return `
    <span class="stat-pill stat-pill-total"><span class="stat-dot"></span>${total} items</span>
    ${critical ? `<span class="stat-pill stat-pill-critical"><span class="stat-dot"></span>${critical} Critical</span>` : ''}
    ${high     ? `<span class="stat-pill stat-pill-high"><span class="stat-dot"></span>${high} High</span>` : ''}
    ${medium   ? `<span class="stat-pill stat-pill-medium"><span class="stat-dot"></span>${medium} Medium</span>` : ''}
  `.trim();
}

// ── Build content for a tab ──
function buildContent(records) {
  if (!records.length) {
    return '<div class="empty-state">🗂 <p>No items in this section yet.</p></div>';
  }
  const sorted = sortRecords(records);

  // Group by Category
  const groups = {};
  const order = [];
  for (const r of sorted) {
    const cat = r.fields['Category'] || 'Uncategorized';
    if (!groups[cat]) { groups[cat] = []; order.push(cat); }
    groups[cat].push(r);
  }

  let html = '';
  for (const cat of order) {
    html += `
<div class="category-divider">
  <span class="category-label">${esc(cat)}</span>
  <div class="category-line"></div>
</div>
<div class="card-grid">
  ${groups[cat].map(cardHTML).join('\n  ')}
</div>`;
  }
  return html;
}

// ── Render all tabs ──
function render(allRecords) {
  const sectionKeys = Object.keys(TAB_SECTIONS);
  for (const key of sectionKeys) {
    const sectionName = TAB_SECTIONS[key];
    const records = allRecords.filter(r => {
      const ps = (r.fields['Page Section'] || '').trim();
      return ps === sectionName;
    });

    document.getElementById('count-' + key).textContent = records.length;
    document.getElementById('stats-' + key).innerHTML = buildStats(records);
    document.getElementById('content-' + key).innerHTML = buildContent(records);
  }
}

// ── Status badge helper ──
function setStatus(state, count) {
  const el = document.getElementById('status-badge');
  el.className = 'status-badge ' + state;
  if (state === 'loading') {
    el.innerHTML = '📦 Loading...';
    el.onclick = null;
  } else if (state === 'connected') {
    el.innerHTML = `⚡ Live from Airtable (${count} items) — <button class="badge-btn" onclick="loadData()">Refresh</button>`;
  } else {
    el.innerHTML = `⚠ Connection Error — <button class="badge-btn" onclick="loadData()">Retry</button>`;
    el.onclick = null;
  }
}

// ── Fetch data ──
async function loadData() {
  setStatus('loading');
  try {
    const res = await fetch('/.netlify/functions/airtable-products');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const records = data.records || [];
    render(records);
    setStatus('connected', records.length);
  } catch (err) {
    console.error('Airtable fetch error:', err);
    // Show error state but also clear the loading placeholders
    document.querySelectorAll('[id^="content-"]').forEach(el => {
      el.innerHTML = '<div class="empty-state">⚠ <p>Could not load items. Check connection.</p></div>';
    });
    document.querySelectorAll('[id^="stats-"]').forEach(el => { el.innerHTML = ''; });
    document.querySelectorAll('[id^="count-"]').forEach(el => { el.textContent = '—'; });
    setStatus('error');
  }
}

// ── Init ──
loadData();
</script>
</body>
</html>
