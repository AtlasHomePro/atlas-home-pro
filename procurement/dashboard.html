<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas Procurement Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#D4A843;--gold-hover:#C09530;--gold-bg:rgba(212,168,67,.07);--gold-border:rgba(212,168,67,.25);
  --black:#1A1A1A;--dark:#2A2A2A;
  --g50:#FAFAFA;--g100:#F5F5F5;--g200:#E8E8E8;--g300:#D0D0D0;--g400:#999;--g500:#777;--g600:#666;--g700:#444;
  --white:#FFF;--red:#D44;--green:#2A9D3E;--blue:#3B8ED0;--orange:#E89020;
  --radius:10px;--shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
}
html{font-size:16px}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--g100);color:var(--black);min-height:100dvh;-webkit-font-smoothing:antialiased}

/* ── Header ── */
.hdr{background:var(--black);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hdr-left{display:flex;align-items:center;gap:12px}
.hdr-logo{width:32px;height:32px;background:var(--gold);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr h1{color:var(--white);font-size:1rem;font-weight:600;letter-spacing:-.01em}
.hdr .sub{color:var(--g400);font-size:.7rem;font-weight:500}
.hdr-actions{display:flex;gap:8px;align-items:center}
.refresh-btn{background:transparent;border:1px solid rgba(255,255,255,.15);color:var(--white);padding:7px 14px;border-radius:8px;font-family:inherit;font-size:.75rem;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:5px;transition:border-color .15s}
.refresh-btn:hover{border-color:rgba(255,255,255,.3)}
.refresh-btn svg{width:14px;height:14px}

/* ── Filters ── */
.filters{background:var(--white);border-bottom:1px solid var(--g200);padding:12px 20px;display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.filters::-webkit-scrollbar{display:none}
.fbtn{padding:7px 14px;border:1px solid var(--g200);border-radius:20px;background:var(--white);font-family:inherit;font-size:.75rem;font-weight:500;color:var(--g600);cursor:pointer;white-space:nowrap;transition:all .15s}
.fbtn.on{background:var(--black);color:var(--white);border-color:var(--black)}
.fbtn .count{display:inline-block;background:var(--g200);color:var(--g700);font-size:.65rem;font-weight:600;padding:1px 6px;border-radius:10px;margin-left:4px}
.fbtn.on .count{background:rgba(255,255,255,.2);color:var(--white)}

/* ── Stats Bar ── */
.stats{display:flex;gap:1px;background:var(--g200);margin:16px 16px 0;border-radius:var(--radius);overflow:hidden}
.stat{flex:1;background:var(--white);padding:12px 14px;text-align:center}
.stat:first-child{border-radius:var(--radius) 0 0 var(--radius)}
.stat:last-child{border-radius:0 var(--radius) var(--radius) 0}
.stat-val{font-size:1.25rem;font-weight:700;color:var(--black)}
.stat-lbl{font-size:.65rem;font-weight:500;color:var(--g500);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}

/* ── Card List ── */
.list{padding:12px 16px 100px;display:flex;flex-direction:column;gap:8px;margin-top:12px}
.card{background:var(--white);border-radius:12px;box-shadow:var(--shadow);overflow:hidden;transition:box-shadow .15s}
.card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}

/* Bulk toolbar */
.bulk-bar{display:none;background:var(--white);border-bottom:1px solid var(--g200);padding:10px 20px;align-items:center;gap:12px;font-size:.8125rem}
.bulk-bar.on{display:flex}
.bulk-bar label{display:flex;align-items:center;gap:6px;cursor:pointer;font-weight:500;color:var(--g600)}
.bulk-bar .bulk-count{color:var(--g700);font-weight:600}
.bulk-bar .bulk-cancel{margin-left:auto;background:none;border:1px solid #fdd;color:var(--red);padding:6px 14px;border-radius:8px;font-family:inherit;font-size:.75rem;font-weight:600;cursor:pointer;transition:background .15s}
.bulk-bar .bulk-cancel:hover{background:#FDE8E8}

/* Card checkbox */
.card-cb{width:18px;height:18px;accent-color:var(--gold);cursor:pointer;flex-shrink:0;margin-top:2px}

/* Card Header (always visible) */
.card-head{padding:14px 16px;display:flex;gap:12px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.card-thumb{width:52px;height:52px;border-radius:8px;background:var(--g200);overflow:hidden;flex-shrink:0}
.card-thumb img{width:100%;height:100%;object-fit:cover}
.card-thumb.empty{display:flex;align-items:center;justify-content:center}
.card-thumb.empty svg{width:20px;height:20px;opacity:.35}
.card-info{flex:1;min-width:0}
.card-top{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px}
.card-name{font-size:.875rem;font-weight:600;color:var(--black);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge{padding:2px 8px;border-radius:6px;font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.03em;white-space:nowrap}
.badge-urg-Emergency{background:#FDE8E8;color:#B91C1C}
.badge-urg-Urgent{background:#FEF3E2;color:#9A5C0F}
.badge-urg-Standard{background:#E8F2FC;color:#1D6DB0}
.badge-urg-Planned{background:var(--g100);color:var(--g600)}
.badge-status{background:var(--g100);color:var(--g600)}
.badge-status-Submitted{background:#F3E8FF;color:#7C3AED}
.badge-status-InReview{background:#FEF3E2;color:#9A5C0F}
.badge-status-Ordered{background:#E0F2FE;color:#0369A1}
.badge-status-Ready{background:#DCFCE7;color:#166534}
.badge-status-InTransit{background:#FEF3E2;color:#9A5C0F}
.badge-status-Fulfilled{background:#D1FAE5;color:#065F46}
.badge-status-Cancelled{background:#FDE8E8;color:#B91C1C}
.badge-trade{background:var(--g100);color:var(--g700);font-weight:500;text-transform:none;font-size:.7rem}
.card-sub{font-size:.75rem;color:var(--g500);margin-top:2px;display:flex;align-items:center;gap:6px}
.card-id{color:var(--g400);font-size:.7rem;font-weight:400}
.card-arrow{width:20px;height:20px;color:var(--g400);flex-shrink:0;transition:transform .2s}
.card.open .card-arrow{transform:rotate(180deg)}

/* Card Expanded Body */
.card-body{display:none;padding:0 16px 16px;border-top:1px solid var(--g100)}
.card.open .card-body{display:block}

/* Section inside expanded card */
.csec{margin-top:14px}
.csec-title{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--g500);margin-bottom:8px}
.csec-text{font-size:.8125rem;color:var(--dark);line-height:1.6;white-space:pre-wrap}


/* Supplier row */
.sup-row{padding:10px 12px;background:var(--g50);border-radius:8px;margin-bottom:6px}
.sup-top{display:flex;align-items:center;justify-content:space-between}
.sup-info{min-width:0;flex:1}
.sup-name{font-size:.8125rem;font-weight:600;color:var(--black);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.sup-detail{display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap}
.sup-phone{font-size:.75rem;color:var(--blue)}
.sup-phone a{color:var(--blue);text-decoration:none}
.sup-dist{font-size:.7rem;color:var(--g500);display:flex;align-items:center;gap:3px}
.sup-dist svg{width:12px;height:12px;flex-shrink:0}
.sup-addr{font-size:.7rem;color:var(--g500);margin-top:2px}
.sup-tag{font-size:.6rem;padding:2px 6px;border-radius:4px;font-weight:600;white-space:nowrap}
.sup-tag-primary{background:var(--gold-bg);color:var(--gold-hover)}
.sup-tag-secondary{background:var(--g100);color:var(--g600)}
.sup-tag-online{background:#E0F2FE;color:#0369A1}
.sup-tag-callin{background:#FEF3E2;color:#9A5C0F}
.sup-tag-instore{background:#DCFCE7;color:#166534}
.sup-method{font-size:.65rem;font-weight:600;padding:2px 7px;border-radius:4px;white-space:nowrap}
.sup-method-online{background:#E0F2FE;color:#0369A1}
.sup-method-call{background:#FEF3E2;color:#9A5C0F}
.sup-method-store{background:#DCFCE7;color:#166534}
.sup-method-multi{background:#F3E8FF;color:#7C3AED}
.sup-actions{display:flex;gap:5px;flex-shrink:0;margin-left:8px}
.sup-actions a{display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:6px;background:var(--white);border:1px solid var(--g200);color:var(--g600);text-decoration:none;transition:border-color .15s}
.sup-actions a:hover{border-color:var(--gold)}
.sup-actions a svg{width:13px;height:13px}
.sup-order-link{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;font-size:.7rem;font-weight:600;text-decoration:none;border:1px solid;transition:opacity .15s}
.sup-order-link:hover{opacity:.8}
.sup-order-link-buy{background:#E0F2FE;color:#0369A1;border-color:#BAE0FC}
.sup-order-link-call{background:#FEF3E2;color:#9A5C0F;border-color:#FDE5B9}
.sup-order-link svg{width:12px;height:12px}

/* Search Links */
.search-links{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.search-link{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border:1px solid var(--g200);border-radius:8px;background:var(--white);font-size:.75rem;font-weight:500;color:var(--dark);text-decoration:none;transition:border-color .15s}
.search-link:hover{border-color:var(--gold)}

/* Status Update Buttons */
.status-bar{display:flex;gap:6px;flex-wrap:wrap;margin-top:14px;padding-top:14px;border-top:1px solid var(--g200)}
.status-btn{padding:8px 16px;border:1px solid var(--g200);border-radius:8px;background:var(--white);font-family:inherit;font-size:.75rem;font-weight:500;color:var(--dark);cursor:pointer;transition:all .15s}
.status-btn:hover{border-color:var(--gold);background:var(--gold-bg)}
.status-btn.active{background:var(--gold);color:var(--black);border-color:var(--gold);font-weight:600}
.status-btn:disabled{opacity:.4;cursor:not-allowed}

/* Photos row */
.photos-row{display:flex;gap:6px;margin-top:8px;overflow-x:auto;padding-bottom:4px}
.photos-row img{width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid var(--g200);cursor:pointer;flex-shrink:0}

/* Lightbox */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;cursor:zoom-out}
.lightbox.on{display:flex}
.lightbox img{max-width:100%;max-height:90vh;border-radius:8px}

/* Confidence badge */
.conf-High{color:var(--green)}
.conf-Medium{color:var(--orange)}
.conf-Low{color:var(--red)}

/* Loading */
.loading{text-align:center;padding:60px 20px;color:var(--g500)}
.loading .spin{width:24px;height:24px;border:2.5px solid var(--g200);border-top-color:var(--gold);border-radius:50%;animation:sp .6s linear infinite;display:inline-block;margin-bottom:12px}
@keyframes sp{to{transform:rotate(360deg)}}

/* Empty */
.empty-state{text-align:center;padding:60px 20px}
.empty-state svg{width:48px;height:48px;color:var(--g300);margin-bottom:12px}
.empty-state h3{font-size:1rem;font-weight:600;margin-bottom:4px}
.empty-state p{font-size:.8125rem;color:var(--g500)}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);padding:12px 20px;border-radius:10px;font-size:.8125rem;font-weight:500;z-index:300;opacity:0;transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s;max-width:calc(100vw - 32px);text-align:center;color:#fff}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.error{background:var(--red)}
.toast.success{background:var(--green)}

/* Modal for notes */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.on{display:flex}
@media(min-width:640px){.modal-overlay.on{align-items:center}}
.modal{background:var(--white);border-radius:16px 16px 0 0;width:100%;max-width:480px;padding:24px 20px;max-height:80vh;overflow-y:auto}
@media(min-width:640px){.modal{border-radius:16px}}
.modal h3{font-size:1rem;font-weight:600;margin-bottom:16px}
.modal label{display:block;font-size:.75rem;font-weight:500;color:var(--g600);margin-bottom:4px;margin-top:12px}
.modal input,.modal textarea{width:100%;padding:10px 12px;font-size:.875rem;font-family:inherit;border:1.5px solid var(--g200);border-radius:8px;background:var(--white)}
.modal input:focus,.modal textarea:focus{outline:none;border-color:var(--gold)}
.modal textarea{min-height:70px;resize:vertical}
.modal-btns{display:flex;gap:8px;margin-top:18px}
.modal-btns button{flex:1;padding:12px;border-radius:10px;font-family:inherit;font-size:.875rem;font-weight:600;cursor:pointer;border:none}
.modal-btns .cancel{background:var(--g100);color:var(--dark)}
.modal-btns .confirm{background:var(--gold);color:var(--black)}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-logo">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M10 2L18 18H2L10 2Z" fill="#1A1A1A" stroke="#1A1A1A" stroke-width="1.2" stroke-linejoin="round"/><line x1="6" y1="13" x2="14" y2="13" stroke="#D4A843" stroke-width="1.2"/></svg>
    </div>
    <div>
      <h1>Procurement Dashboard</h1>
      <div class="sub" id="lastUpdated">Loading...</div>
    </div>
  </div>
  <div class="hdr-actions">
    <button class="refresh-btn" id="refreshBtn" onclick="loadData()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
      Refresh
    </button>
  </div>
</div>

<div class="filters" id="filters"></div>

<div class="stats" id="stats"></div>

<div class="bulk-bar" id="bulkBar">
  <label><input type="checkbox" id="selectAll" onchange="toggleSelectAll(this.checked)"> Select All</label>
  <span class="bulk-count" id="bulkCount">0 selected</span>
  <button class="bulk-cancel" id="bulkCancelBtn" onclick="bulkCancel()">Cancel Selected</button>
</div>

<div class="list" id="list">
  <div class="loading"><div class="spin"></div><p>Loading requests...</p></div>
</div>

<!-- Lightbox for photos -->
<div class="lightbox" id="lightbox" onclick="this.classList.remove('on')">
  <img id="lbImg" src="">
</div>

<!-- Status update modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modalTitle">Update Status</h3>
    <label>Notes</label>
    <textarea id="modalNotes" placeholder="Optional notes..."></textarea>
    <label id="lbl-conf" style="display:none">Order Confirmation #</label>
    <input id="modalConf" style="display:none" placeholder="PO number or will-call name">
    <label id="lbl-pickup" style="display:none">Pickup Location</label>
    <input id="modalPickup" style="display:none" placeholder="Branch address for pickup">
    <label id="lbl-cost" style="display:none">Estimated Cost ($)</label>
    <input id="modalCost" type="number" style="display:none" placeholder="0.00" step="0.01">
    <div class="modal-btns">
      <button class="cancel" onclick="closeModal()">Cancel</button>
      <button class="confirm" id="modalConfirm">Confirm</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let allRequests = [];
let allSuppliers = {};
let currentFilter = "In Review";
let pendingStatusUpdate = null;
let selectedIds = new Set();

// ── Load Data ──
async function loadData() {
  try {
    const [reqResp, supResp] = await Promise.all([
      fetch("/api/requests"),
      fetch("/api/suppliers"),
    ]);

    if (!reqResp.ok || !supResp.ok) throw new Error("Failed to load data");

    allRequests = await reqResp.json();
    const suppliers = await supResp.json();

    // Index suppliers by ID
    allSuppliers = {};
    suppliers.forEach(s => { allSuppliers[s.id] = s; });

    document.getElementById("lastUpdated").textContent = `Updated ${new Date().toLocaleTimeString()}`;
    renderFilters();
    renderStats();
    renderList();
  } catch (err) {
    console.error(err);
    document.getElementById("list").innerHTML =
      `<div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:48px;height:48px;color:var(--g300);margin-bottom:12px"><path d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        <h3>Unable to connect</h3>
        <p>Could not reach the Airtable API.<br>Check that the server is configured with a valid Airtable token.</p>
      </div>`;
  }
}

// ── Render Filters ──
function renderFilters() {
  const now = new Date();
  const h24 = new Date(now - 24*60*60*1000);
  const d7 = new Date(now - 7*24*60*60*1000);
  // For "All" tab: hide cancelled older than 7 days
  const allVisible = allRequests.filter(r => {
    if (r.status === "Cancelled" && r.created_at && new Date(r.created_at) < d7) return false;
    return true;
  });
  const counts = { all: allVisible.length };
  const statuses = ["Submitted","In Review","Ordered","Ready","In Transit","Fulfilled","Cancelled"];
  // For Cancelled tab: only last 24h
  const cancelledRecent = allRequests.filter(r => r.status === "Cancelled" && r.created_at && new Date(r.created_at) >= h24);
  statuses.forEach(s => {
    counts[s] = s === "Cancelled" ? cancelledRecent.length : allRequests.filter(r => r.status === s).length;
  });

  const fil = document.getElementById("filters");
  fil.innerHTML = "";

  const addBtn = (key, label, subtitle) => {
    if (key !== "all" && !counts[key]) return;
    const b = document.createElement("button");
    b.className = "fbtn" + (currentFilter === key ? " on" : "");
    b.innerHTML = `${label}<span class="count">${counts[key] || 0}</span>${subtitle ? `<br><span style="font-size:.55rem;font-weight:400;opacity:.7">${subtitle}</span>` : ""}`;
    b.onclick = () => { currentFilter = key; selectedIds.clear(); renderFilters(); renderList(); updateBulkBar(); };
    fil.appendChild(b);
  };

  addBtn("all", "All");
  statuses.forEach(s => addBtn(s, s, s === "Cancelled" ? "last 24h" : ""));
}

// ── Render Stats ──
function renderStats() {
  const active = allRequests.filter(r => !["Fulfilled","Cancelled"].includes(r.status));
  const emergency = allRequests.filter(r => r.urgency === "Emergency" && !["Fulfilled","Cancelled"].includes(r.status));
  const needsReview = allRequests.filter(r => ["Submitted","In Review"].includes(r.status));
  const today = allRequests.filter(r => {
    const d = new Date(r.created_at);
    const now = new Date();
    return d.toDateString() === now.toDateString();
  });

  document.getElementById("stats").innerHTML = `
    <div class="stat"><div class="stat-val">${active.length}</div><div class="stat-lbl">Active</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--red)">${emergency.length}</div><div class="stat-lbl">Emergency</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--orange)">${needsReview.length}</div><div class="stat-lbl">Needs Action</div></div>
    <div class="stat"><div class="stat-val">${today.length}</div><div class="stat-lbl">Today</div></div>
  `;
}

// ── Render List ──
function getFilteredRequests() {
  const now = new Date();
  const h24 = new Date(now - 24*60*60*1000);
  const d7 = new Date(now - 7*24*60*60*1000);

  if (currentFilter === "Cancelled") {
    return allRequests.filter(r => r.status === "Cancelled" && r.created_at && new Date(r.created_at) >= h24);
  }
  if (currentFilter === "all") {
    return allRequests.filter(r => {
      if (r.status === "Cancelled" && r.created_at && new Date(r.created_at) < d7) return false;
      return true;
    });
  }
  return allRequests.filter(r => r.status === currentFilter);
}

function renderList() {
  const list = document.getElementById("list");
  const filtered = getFilteredRequests();

  if (filtered.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
        <h3>No requests</h3>
        <p>${currentFilter === "all" ? "No procurement requests yet." : `No requests with status "${currentFilter}".`}</p>
      </div>`;
    updateBulkBar();
    return;
  }

  list.innerHTML = filtered.map(r => renderCard(r)).join("");

  // Attach click handlers (expand card, but not on checkbox)
  list.querySelectorAll(".card-head").forEach(h => {
    h.onclick = (e) => { if (e.target.classList.contains("card-cb")) return; h.parentElement.classList.toggle("open"); };
  });
  updateBulkBar();
}

function renderCard(r) {
  const thumb = r.photos.length > 0
    ? `<img src="${r.photos[0].thumb}" alt="">`
    : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>`;

  const thumbClass = r.photos.length > 0 ? "card-thumb" : "card-thumb empty";
  // Strip [PARTS REQUEST] / [DIAGNOSTICS] prefix from raw_description for display
  const cleanDesc = (r.raw_description || "").replace(/^\[(PARTS REQUEST|DIAGNOSTICS)\]\s*/i, "");
  const isDiagnostic = r.ai_part_name && (/^diagnostic/i.test(r.ai_part_name) || /pending diagnosis/i.test(r.ai_part_name) || r.ai_part_name === "Diagnostics Required");
  let partName;
  if (isDiagnostic) {
    partName = cleanDesc.length > 60 ? cleanDesc.slice(0, 60) + "..." : cleanDesc || r.ai_part_name;
  } else {
    partName = r.ai_part_name || (cleanDesc.length > 50 ? cleanDesc.slice(0, 50) + "..." : cleanDesc) || "Pending AI...";
  }
  const statusKey = r.status.replace(/\s/g, "");
  const timeAgo = getTimeAgo(r.created_at);
  const tradeSuppliers = getTradeSuppliers(r);

  // Next status options
  const statusFlow = ["Submitted","In Review","Ordered","Ready","In Transit","Fulfilled"];
  const currentIdx = statusFlow.indexOf(r.status);
  const nextStatuses = currentIdx >= 0 ? statusFlow.slice(currentIdx + 1) : [];

  // Search query for the part — prefer ai_search_query, fall back to ai_part_name
  const searchQ = encodeURIComponent(r.ai_search_query || r.ai_part_name || r.raw_description.slice(0, 40));

  const reqId = r.request_id ? `#${r.request_id}` : "";
  const isChecked = selectedIds.has(r.id) ? "checked" : "";

  return `
  <div class="card" data-id="${r.id}">
    <div class="card-head">
      <input type="checkbox" class="card-cb" ${isChecked} onchange="toggleSelect('${r.id}', this.checked)">
      <div class="${thumbClass}">${thumb}</div>
      <div class="card-info">
        <div class="card-top">
          <span class="card-name">${esc(partName)}</span>
        </div>
        <div class="card-meta">
          <span class="badge badge-urg-${r.urgency}">${r.urgency}</span>
          <span class="badge badge-status-${statusKey}">${r.status}</span>
          ${r.trade ? `<span class="badge badge-trade">${r.trade}</span>` : ""}
        </div>
        <div class="card-sub">
          <span>${esc(r.submitted_by)}</span>
          ${reqId ? `<span class="card-id">${reqId}</span>` : ""}
          <span>·</span>
          <span>${timeAgo}</span>
          ${r.fulfillment_method ? `<span>·</span><span>${r.fulfillment_method}</span>` : ""}
        </div>
      </div>
      <svg class="card-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>
    </div>

    <div class="card-body">
      ${r.photos.length > 0 ? `
      <div class="csec">
        <div class="csec-title">Photos</div>
        <div class="photos-row">
          ${r.photos.map(p => `<img src="${p.thumb}" onclick="openLightbox('${p.url}')" alt="">`).join("")}
        </div>
      </div>` : ""}

      ${r.ai_part_name ? `
      <div class="csec">
        <div class="csec-title">AI Identification <span class="conf-${r.ai_confidence}" style="font-weight:600">${r.ai_confidence ? "· " + r.ai_confidence + " confidence" : ""}</span></div>
        <div style="font-size:.8125rem;color:var(--dark);line-height:1.6">
          <strong>${esc(r.ai_part_name)}</strong>
          ${r.ai_brand && r.ai_brand !== "Unknown" ? ` · ${esc(r.ai_brand)}` : ""}
          ${r.ai_model_number && r.ai_model_number !== "Unknown" ? ` · ${esc(r.ai_model_number)}` : ""}
          ${r.ai_specs ? `<br><span style="color:var(--g600)">${esc(r.ai_specs)}</span>` : ""}
        </div>
        ${r.ai_clarification_needed ? `<div style="margin-top:6px;padding:8px 10px;background:#FEF3E2;border-radius:6px;font-size:.75rem;color:#9A5C0F">⚠ ${esc(r.ai_clarification_needed)}</div>` : ""}
      </div>` : ""}

      ${r.ai_diagnosis ? `
      <div class="csec" style="border-left:3px solid var(--orange);padding-left:12px">
        <div class="csec-title" style="color:var(--orange)">AI Diagnosis</div>
        <div class="csec-text">${esc(r.ai_diagnosis)}</div>
        ${r.troubleshooting_steps ? `
        <div class="csec-title" style="margin-top:10px;color:var(--orange)">Troubleshooting Steps</div>
        <div class="csec-text">${esc(r.troubleshooting_steps)}</div>` : ""}
        ${r.likely_parts_needed ? `
        <div class="csec-title" style="margin-top:10px;color:var(--orange)">Likely Parts Needed</div>
        <div class="csec-text">${esc(r.likely_parts_needed)}</div>` : ""}
      </div>` : ""}

      ${r.raw_description ? `
      <div class="csec">
        <div class="csec-title">Original Description</div>
        <div class="csec-text">${esc(cleanDesc)}</div>
      </div>` : ""}

      ${tradeSuppliers.length > 0 ? `
      <div class="csec">
        <div class="csec-title">Suppliers for ${esc(r.trade || 'This Trade')} <span style="font-weight:400;color:var(--g400);text-transform:none">(${tradeSuppliers.length})</span></div>
        ${tradeSuppliers.map(s => renderSupplierRow(s, searchQ)).join("")}
      </div>` : ""}

      <div class="csec">
        <div class="csec-title">Search This Part Online</div>
        <div class="search-links">
          <a class="search-link" href="https://www.homedepot.com/s/${searchQ}" target="_blank">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            Home Depot
          </a>
          <a class="search-link" href="https://www.lowes.com/search?searchTerm=${searchQ}" target="_blank">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            Lowe's
          </a>
          <a class="search-link" href="https://www.amazon.com/s?k=${searchQ}" target="_blank">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            Amazon
          </a>
        </div>
      </div>



      ${r.status !== "Fulfilled" && r.status !== "Cancelled" ? `
      <div class="status-bar">
        ${nextStatuses.map(s => `<button class="status-btn" onclick="promptStatusUpdate('${r.id}','${s}')">${s === "In Review" ? "Start Review" : s === "Ordered" ? "Mark Ordered" : s === "Ready" ? "Mark Ready" : s === "In Transit" ? "In Transit" : s === "Fulfilled" ? "Mark Fulfilled" : s}</button>`).join("")}
        <button class="status-btn" onclick="promptStatusUpdate('${r.id}','Cancelled')" style="color:var(--red);border-color:#fdd">Cancel</button>
      </div>` : ""}

      ${r.order_confirmation ? `<div style="margin-top:10px;font-size:.75rem;color:var(--g500)">Order #: ${esc(r.order_confirmation)}</div>` : ""}
      ${r.estimated_cost ? `<div style="font-size:.75rem;color:var(--g500)">Est. cost: $${r.estimated_cost.toFixed(2)}</div>` : ""}
    </div>
  </div>`;
}

// ── Helpers ──
function getTradeSuppliers(r) {
  const trade = r.trade;
  if (!trade) return [];
  
  // Get all suppliers matching this trade
  const matching = Object.values(allSuppliers).filter(s => {
    const cats = s.trade_category || [];
    return Array.isArray(cats) ? cats.includes(trade) : cats === trade;
  });
  
  // Sort: PRIMARY first, then SECONDARY, then BACKUP, then by distance
  const priorityOrder = { PRIMARY: 0, SECONDARY: 1, BACKUP: 2 };
  matching.sort((a, b) => {
    const pa = priorityOrder[a.priority] ?? 3;
    const pb = priorityOrder[b.priority] ?? 3;
    if (pa !== pb) return pa - pb;
    // Then by distance string (rough sort)
    const da = parseFloat((a.distance_from_90036 || '99').replace(/[^0-9.]/g, '')) || 99;
    const db = parseFloat((b.distance_from_90036 || '99').replace(/[^0-9.]/g, '')) || 99;
    return da - db;
  });
  
  return matching;
}

function renderSupplierRow(s, searchQ) {
  const url = s.website ? (s.website.startsWith('http') ? s.website : 'https://' + s.website) : '';
  const orderUrl = s.online_ordering_url ? (s.online_ordering_url.startsWith('http') ? s.online_ordering_url : 'https://' + s.online_ordering_url) : '';
  const dist = s.distance_from_90036 || '';
  const addr = s.address || '';
  const method = s.order_method || '';
  const priority = s.priority || '';
  
  // Priority tag
  let priorityTag = '';
  if (priority === 'PRIMARY') priorityTag = '<span class="sup-tag sup-tag-primary">PRIMARY</span>';
  else if (priority === 'SECONDARY') priorityTag = '<span class="sup-tag sup-tag-secondary">SECONDARY</span>';
  
  // Order method tag
  let methodTag = '';
  let methodClass = '';
  if (method.includes('Online Only')) { methodTag = 'Online Only'; methodClass = 'sup-method-online'; }
  else if (method.includes('Online') && method.includes('Call') && method.includes('Store')) { methodTag = 'Online · Call · In-Store'; methodClass = 'sup-method-multi'; }
  else if (method.includes('Online') && method.includes('Call')) { methodTag = 'Online · Call'; methodClass = 'sup-method-multi'; }
  else if (method.includes('Online') && method.includes('Store')) { methodTag = 'Online · In-Store'; methodClass = 'sup-method-multi'; }
  else if (method.includes('Online')) { methodTag = 'Order Online'; methodClass = 'sup-method-online'; }
  else if (method.includes('Call')) { methodTag = 'Call to Order'; methodClass = 'sup-method-call'; }
  else if (method.includes('Store')) { methodTag = 'In-Store Only'; methodClass = 'sup-method-store'; }
  else if (method.includes('Contact')) { methodTag = 'Contact Supplier'; methodClass = 'sup-method-call'; }
  
  // Distance/location line
  let locationLine = '';
  if (dist && dist.toLowerCase().includes('online')) {
    locationLine = '<span class="sup-dist"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg> Online Only — Ships to Job</span>';
  } else if (dist) {
    locationLine = `<span class="sup-dist"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg> ${esc(dist)}${addr ? ' — ' + esc(addr) : ''}</span>`;
  } else if (addr) {
    locationLine = `<span class="sup-dist"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg> ${esc(addr)}</span>`;
  }
  
  // Action buttons: Order link (primary CTA) + Call + Website
  let orderLink = '';
  if (orderUrl && method.includes('Online')) {
    // Build search URL if possible
    let searchUrl = orderUrl;
    if (searchQ) {
      const base = orderUrl.replace(/\/+$/, '');
      if (base.includes('homedepot.com')) searchUrl = `https://www.homedepot.com/s/${searchQ}`;
      else if (base.includes('lowes.com')) searchUrl = `https://www.lowes.com/search?searchTerm=${searchQ}`;
      else if (base.includes('amazon.com')) searchUrl = `https://www.amazon.com/s?k=${searchQ}`;
      else if (base.includes('supplyhouse.com')) searchUrl = `https://www.supplyhouse.com/search?q=${searchQ}`;
      else if (base.includes('ferguson.com')) searchUrl = `https://www.ferguson.com/search/${searchQ}`;
      else if (base.includes('hdsupply')) searchUrl = `https://hdsupplysolutions.com/shop/search?query=${searchQ}`;
    }
    orderLink = `<a class="sup-order-link sup-order-link-buy" href="${searchUrl}" target="_blank"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg> Order Online</a>`;
  } else if (s.phone && method.includes('Call')) {
    orderLink = `<a class="sup-order-link sup-order-link-call" href="tel:${s.phone}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg> Call to Order</a>`;
  }
  
  return `
    <div class="sup-row">
      <div class="sup-top">
        <div class="sup-info">
          <div class="sup-name">
            ${esc(s.company_name)}
            ${priorityTag}
            ${methodTag ? `<span class="sup-method ${methodClass}">${methodTag}</span>` : ''}
          </div>
          <div class="sup-detail">
            ${locationLine}
            ${s.phone ? `<span class="sup-phone"><a href="tel:${s.phone}">${s.phone}</a></span>` : ''}
          </div>
        </div>
        <div class="sup-actions">
          ${s.phone ? `<a href="tel:${s.phone}" title="Call"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg></a>` : ''}
          ${url ? `<a href="${url}" target="_blank" title="Website"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg></a>` : ''}
        </div>
      </div>
      ${orderLink ? `<div style="margin-top:6px">${orderLink}</div>` : ''}
    </div>`;
}

function getTimeAgo(dateStr) {
  if (!dateStr) return "";
  const d = new Date(dateStr);
  const now = new Date();
  const mins = Math.floor((now - d) / 60000);
  if (mins < 1) return "just now";
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  return `${days}d ago`;
}

function esc(s) {
  if (!s) return "";
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function openLightbox(url) {
  document.getElementById("lbImg").src = url;
  document.getElementById("lightbox").classList.add("on");
}

// ── Status Update ──
function promptStatusUpdate(recordId, newStatus) {
  pendingStatusUpdate = { recordId, newStatus };
  document.getElementById("modalTitle").textContent = `Update to: ${newStatus}`;
  document.getElementById("modalNotes").value = "";
  document.getElementById("modalConf").value = "";
  document.getElementById("modalPickup").value = "";
  document.getElementById("modalCost").value = "";

  // Show extra fields for "Ordered" status
  const showConf = newStatus === "Ordered" || newStatus === "Ready";
  document.getElementById("lbl-conf").style.display = showConf ? "block" : "none";
  document.getElementById("modalConf").style.display = showConf ? "block" : "none";
  document.getElementById("lbl-pickup").style.display = showConf ? "block" : "none";
  document.getElementById("modalPickup").style.display = showConf ? "block" : "none";
  document.getElementById("lbl-cost").style.display = showConf ? "block" : "none";
  document.getElementById("modalCost").style.display = showConf ? "block" : "none";

  document.getElementById("modal").classList.add("on");
}

function closeModal() {
  document.getElementById("modal").classList.remove("on");
  pendingStatusUpdate = null;
}

document.getElementById("modalConfirm").onclick = async () => {
  if (!pendingStatusUpdate) return;

  const { recordId, newStatus } = pendingStatusUpdate;
  const notes = document.getElementById("modalNotes").value.trim();
  const conf = document.getElementById("modalConf").value.trim();
  const pickup = document.getElementById("modalPickup").value.trim();
  const cost = document.getElementById("modalCost").value.trim();

  const btn = document.getElementById("modalConfirm");
  btn.disabled = true;
  btn.textContent = "Updating...";

  try {
    const body = { status: newStatus };
    if (notes) body.coordinator_notes = notes;
    if (conf) body.order_confirmation = conf;
    if (pickup) body.pickup_location = pickup;
    if (cost) body.estimated_cost = cost;

    const resp = await fetch(`/api/requests/${recordId}/status`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });

    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.error || "Update failed");
    }

    closeModal();
    toast(`Status updated to ${newStatus}`, "success");
    await loadData();
  } catch (err) {
    toast("Failed: " + err.message, "error");
  } finally {
    btn.disabled = false;
    btn.textContent = "Confirm";
  }
};

// Close modal on overlay click
document.getElementById("modal").addEventListener("click", (e) => {
  if (e.target === document.getElementById("modal")) closeModal();
});

function toast(msg, type) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast " + (type || "");
  void t.offsetWidth;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3500);
}

// ── Bulk select/cancel ──
function toggleSelect(id, checked) {
  if (checked) selectedIds.add(id); else selectedIds.delete(id);
  updateBulkBar();
}

function toggleSelectAll(checked) {
  const filtered = getFilteredRequests();
  if (checked) {
    filtered.forEach(r => selectedIds.add(r.id));
  } else {
    selectedIds.clear();
  }
  renderList();
}

function updateBulkBar() {
  const bar = document.getElementById("bulkBar");
  const count = selectedIds.size;
  bar.classList.toggle("on", count > 0);
  document.getElementById("bulkCount").textContent = `${count} selected`;
  document.getElementById("selectAll").checked = false;
}

async function bulkCancel() {
  const count = selectedIds.size;
  if (!count) return;
  if (!confirm(`Cancel ${count} request${count > 1 ? "s" : ""}?`)) return;

  const btn = document.getElementById("bulkCancelBtn");
  btn.disabled = true;
  btn.textContent = "Cancelling...";

  try {
    const promises = [...selectedIds].map(id =>
      fetch(`/api/requests/${id}/status`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ status: "Cancelled" }),
      })
    );
    await Promise.all(promises);
    selectedIds.clear();
    toast(`${count} request${count > 1 ? "s" : ""} cancelled`, "success");
    await loadData();
  } catch (err) {
    toast("Failed: " + err.message, "error");
  } finally {
    btn.disabled = false;
    btn.textContent = "Cancel Selected";
  }
}

// ── Auto-refresh every 30 seconds ──
setInterval(loadData, 30000);

// ── Initial load ──
loadData();
</script>
</body>
